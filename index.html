<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן נקודות חכם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--g:#2a7a50;--g2:#1d5c3b;--gl:#4caf7a;--gp:#eaf5ef;--bg:#f2f6f3;--txt:#182e20;--mut:#6a8c72;--brd:#cfe8d8;--warn:#e07000;--red:#c02020}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);direction:rtl}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.hdr h1{font-size:19px;font-weight:900}

/* BUDGET */
.bud{background:#fff;padding:10px 16px 8px;border-bottom:2px solid var(--brd)}
.brow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bnums{display:flex;gap:18px}
.bn{text-align:center}
.bv{font-size:24px;font-weight:900;line-height:1;color:var(--g)}
.bv.w{color:var(--warn)}.bv.r{color:var(--red)}
.bl{font-size:10px;color:var(--mut);font-weight:600}
.bctl{display:flex;align-items:center;gap:6px}
.bi{width:50px;border:2px solid var(--brd);border-radius:8px;padding:4px 5px;font-size:14px;font-weight:700;text-align:center;font-family:'Heebo',sans-serif}
.bi:focus{outline:none;border-color:var(--g)}
.rst{background:#ffe8e8;color:#b02020;border:none;padding:5px 10px;border-radius:7px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.pgb{height:9px;background:var(--brd);border-radius:8px;overflow:hidden}
.pgf{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gl),var(--g));transition:width .4s,background .3s}
.pgf.w{background:linear-gradient(90deg,#f0b000,var(--warn))}.pgf.r{background:linear-gradient(90deg,#e05050,var(--red))}

/* TABS */
.tabs{position:sticky;top:83px;z-index:150;display:flex;background:#fff;border-bottom:2px solid var(--brd)}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;border:none;background:none;font-family:'Heebo',sans-serif;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--g);border-bottom-color:var(--g)}
.pg{display:none}.pg.active{display:block}

/* SEARCH PAGE */
.sp{padding:12px 16px 100px}
.sbox{background:#fff;border-radius:14px;border:2px solid var(--brd);box-shadow:0 2px 10px rgba(42,122,80,.07);margin-bottom:12px}
.stop{display:flex;align-items:center;gap:8px;padding:10px 12px}
.sin{flex:1;border:none;outline:none;font-size:15px;font-family:'Heebo',sans-serif;color:var(--txt);background:transparent}
.sin::placeholder{color:#aac4b4}
.sbtn{background:var(--g);color:#fff;border:none;border-radius:9px;padding:7px 14px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.sbtn:disabled{background:#aaa}
.shint{padding:0 12px 8px;font-size:11px;color:var(--mut);line-height:1.5}
.ldots{display:flex;gap:5px;padding:12px 14px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:b .8s infinite}
.dot:nth-child(2){animation-delay:.16s}.dot:nth-child(3){animation-delay:.32s}
@keyframes b{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.rtit{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:.5px;padding:6px 0 7px;text-transform:uppercase}
.fc{background:#fff;border-radius:11px;padding:9px 11px;margin-bottom:5px;border:1.5px solid var(--brd);display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(42,122,80,.05)}
.fn{flex:1;font-size:13px;font-weight:600;line-height:1.3;min-width:0}
.sb{display:inline-block;background:var(--gp);color:var(--g);font-size:8px;font-weight:800;border-radius:4px;padding:1px 4px;margin-right:3px;vertical-align:middle}
.fp{min-width:38px;height:38px;border-radius:9px;background:var(--gp);color:var(--g);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab{width:32px;height:32px;border-radius:8px;background:var(--g);color:#fff;font-size:20px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab:active{background:var(--g2);transform:scale(.9)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{padding:4px 11px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer}
.chip.active{background:var(--g);color:#fff;border-color:var(--g)}
.nores{text-align:center;padding:20px 0;color:var(--mut);font-size:13px}

/* LOG PAGE */
.lp{padding:0 0 100px}

/* DAY NAVIGATOR */
.daynav{background:#fff;border-bottom:2px solid var(--brd);padding:10px 16px;position:sticky;top:133px;z-index:100}
.daynav-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dn-arrow{width:36px;height:36px;border-radius:50%;border:2px solid var(--brd);background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:var(--g)}
.dn-arrow:active{background:var(--gp)}.dn-arrow:disabled{color:#ccc;cursor:default}
.dn-center{flex:1;text-align:center;cursor:pointer}
.dn-date{font-size:14px;font-weight:800;color:var(--txt)}
.dn-date.today{color:var(--g)}
.dn-sub{font-size:11px;color:var(--mut);margin-top:1px}
.dn-today-btn{font-size:11px;font-weight:700;color:var(--g);background:var(--gp);border:none;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:'Heebo',sans-serif}
.dn-today-btn:disabled{background:var(--brd);color:var(--mut);cursor:default}

/* DAY BUDGET BAR */
.daybudbar{background:#fff;padding:6px 16px 10px;border-bottom:2px solid var(--brd)}
.dbb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.dbb-pts{display:flex;gap:16px}
.dbb-n{text-align:center}
.dbb-v{font-size:20px;font-weight:900;line-height:1;color:var(--g)}
.dbb-v.w{color:var(--warn)}.dbb-v.r{color:var(--red)}
.dbb-l{font-size:10px;color:var(--mut);font-weight:600}

.lc-inner{padding:10px 16px}

/* LOG ITEMS */
.ltt{font-size:15px;font-weight:800;padding:6px 0 9px;display:flex;justify-content:space-between;align-items:center}
.dbg{background:var(--gp);color:var(--g);font-size:12px;font-weight:700;padding:3px 11px;border-radius:18px}
.dbg.w{background:#fff3de;color:var(--warn)}.dbg.r{background:#ffe8e8;color:var(--red)}
.li{display:flex;align-items:center;background:#fff;border-radius:10px;padding:8px 11px;margin-bottom:5px;border:1.5px solid var(--brd)}
.lt{font-size:11px;color:var(--mut);font-weight:600;min-width:36px;margin-left:7px;flex-shrink:0}
.ln{flex:1;font-size:13px;font-weight:600;min-width:0}
.lpts{font-size:14px;font-weight:900;color:var(--g);margin:0 8px;flex-shrink:0}
.rm{width:26px;height:26px;border-radius:6px;background:#ffe8e8;color:#c00;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.el{text-align:center;color:var(--mut);padding:28px 0;font-size:13px}
.el .em{font-size:36px;display:block;margin-bottom:8px}

/* WEEK STRIP */
.week-strip{display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;margin-bottom:4px}
.week-strip::-webkit-scrollbar{display:none}
.wday{flex:none;width:46px;border-radius:10px;border:1.5px solid var(--brd);background:#fff;padding:6px 4px;text-align:center;cursor:pointer;transition:all .15s}
.wday.active{border-color:var(--g);background:var(--gp)}
.wday.today-marker{border-color:var(--gl)}
.wday-name{font-size:10px;font-weight:700;color:var(--mut)}
.wday-num{font-size:14px;font-weight:900;color:var(--txt);margin:2px 0 1px}
.wday-pts{font-size:9px;font-weight:700;color:var(--mut)}
.wday-pts.has{color:var(--g)}
.wday-dot{width:5px;height:5px;border-radius:50%;background:var(--g);margin:2px auto 0;opacity:0}
.wday-dot.show{opacity:1}
.wday.active .wday-name,.wday.active .wday-num{color:var(--g)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--brd);display:flex;z-index:300}
.nb{flex:1;padding:10px 0 9px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--mut);font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;transition:color .2s}
.nb .i{font-size:20px}.nb.active{color:var(--g)}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--g);color:#fff;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 14px rgba(42,122,80,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr"><h1>🥗 יומן נקודות חכם</h1></div>

<!-- GLOBAL BUDGET -->
<div class="bud">
  <div class="brow">
    <div class="bnums">
      <div class="bn"><div class="bv" id="uv">0</div><div class="bl">נצרך היום</div></div>
      <div class="bn"><div class="bv" id="rv">30</div><div class="bl">נותר היום</div></div>
    </div>
    <div class="bctl">
      <span style="font-size:11px;color:var(--mut)">תקציב יומי:</span>
      <input class="bi" type="number" id="bi" value="30" min="1" max="200" oninput="saveBud()">
    </div>
  </div>
  <div class="pgb"><div class="pgf" id="pf" style="width:0%"></div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tS" onclick="showPg('s')">🔍 חיפוש מזון</button>
  <button class="tab" id="tL" onclick="showPg('l')">📅 יומן</button>
</div>

<!-- SEARCH PAGE -->
<div class="pg active" id="pgS">
  <div class="sp">
    <div class="sbox">
      <div class="stop">
        <span style="font-size:18px">🤖</span>
        <input class="sin" id="si" placeholder="חפשי כל מזון... חזה עוף, גבינה בולגרית, פיתה מלאה..." type="text">
        <button class="sbtn" id="sb" onclick="doSearch()">חפש</button>
      </div>
      <div class="shint">חיפוש חכם על כל 700+ מזונות מהחוברת — כולל אכילה בחוץ</div>
      <div id="ld" style="display:none"><div class="ldots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    </div>
    <div id="ar"></div>
    <div>
      <div class="rtit">🗂 עיון לפי אות</div>
      <div class="chips" id="cc"></div>
      <div id="cr"></div>
    </div>
  </div>
</div>

<!-- LOG PAGE -->
<div class="pg" id="pgL">

  <!-- WEEK STRIP -->
  <div class="week-strip" id="weekStrip"></div>

  <!-- DAY NAVIGATOR -->
  <div class="daynav">
    <div class="daynav-row">
      <button class="dn-arrow" id="dnPrev" onclick="moveDay(-1)">‹</button>
      <div class="dn-center" onclick="goToday()">
        <div class="dn-date" id="dnDate">—</div>
        <div class="dn-sub" id="dnSub">—</div>
      </div>
      <button class="dn-today-btn" id="dnTodayBtn" onclick="goToday()">היום</button>
      <button class="dn-arrow" id="dnNext" onclick="moveDay(1)">›</button>
    </div>
  </div>

  <!-- DAY BUDGET BAR -->
  <div class="daybudbar">
    <div class="dbb-row">
      <div class="dbb-pts">
        <div class="dbb-n"><div class="dbb-v" id="dUsed">0</div><div class="dbb-l">נצרך</div></div>
        <div class="dbb-n"><div class="dbb-v" id="dRem">30</div><div class="dbb-l">נותר</div></div>
      </div>
      <button class="rst" onclick="resetCurrentDay()">🗑 איפוס יום</button>
    </div>
    <div class="pgb"><div class="pgf" id="dpf" style="width:0%"></div></div>
  </div>

  <!-- LOG CONTENT -->
  <div class="lc-inner" id="lc"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="nb active" id="nS" onclick="showPg('s')"><span class="i">🔍</span><span>חיפוש</span></button>
  <button class="nb" id="nL" onclick="showPg('l')"><span class="i">📅</span><span>יומן</span></button>
</div>
<div class="toast" id="toast"></div>

const CATS=["א","ב","ג","ד","ה","ו","ז","ח","ט","י","כ","ל","מ","נ","ס","ע","פ","צ","ק","ר","ש","ת","x"];
const CLABELS={"x":"🍽️ אכילה בחוץ"};

// ── STATE ──
let DB={}, bud=30, acCat=null;
let viewOffset=0; // 0=today, 1=tomorrow, -1=yesterday, etc.

function p2(n){return String(n).padStart(2,'0');}
function dateByOffset(off){const d=new Date();d.setDate(d.getDate()+off);return d;}
function keyByOffset(off){const d=dateByOffset(off);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function keyToDate(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function todayKey(){return keyByOffset(0);}
function ft(ts){const d=new Date(ts);return`${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function fp(p){if(p===0)return'0';if(p!==Math.floor(p))return p.toString().replace('.5','½');return p.toString();}
function formatDate(off){const d=dateByOffset(off);return`${d.getDate()} ב${['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][d.getMonth()]} ${d.getFullYear()}`;}
function dayName(off){const d=dateByOffset(off);if(off===0)return'היום';if(off===1)return'מחר';if(off===-1)return'אתמול';return`יום ${'ראשון שני שלישי רביעי חמישי שישי שבת'.split(' ')[d.getDay()]}`;}

function load(){try{const r=localStorage.getItem('ww7db');if(r)DB=JSON.parse(r);}catch(e){DB={};}try{const b=localStorage.getItem('ww7b');if(b){bud=parseInt(b)||30;document.getElementById('bi').value=bud;}}catch(e){}}
function save(){try{localStorage.setItem('ww7db',JSON.stringify(DB));}catch(e){}}
function saveBud(){bud=parseInt(document.getElementById('bi').value)||30;try{localStorage.setItem('ww7b',bud);}catch(e){}updTodayBar();updateDayView();}

function addToLog(name,pts){
  // Always add to today regardless of which day we're viewing
  const k=todayKey();
  if(!DB[k])DB[k]=[];
  DB[k].push({name,pts,time:Date.now(),id:Date.now()+Math.random()});
  save();updTodayBar();
  // Switch to log view on today if needed
  if(document.getElementById('pgL').classList.contains('active')){
    if(viewOffset!==0){viewOffset=0;updateDayNav();}
    renderDayLog();buildWeekStrip();
  }
  showToast('✅ '+name.substring(0,26)+(name.length>26?'...':''));
}

function removeItem(dk,id){
  if(!DB[dk])return;
  DB[dk]=DB[dk].filter(i=>i.id!==id);
  save();updTodayBar();renderDayLog();buildWeekStrip();
}

function resetCurrentDay(){
  const k=keyByOffset(viewOffset);
  if(!DB[k]||!DB[k].length)return;
  const label=viewOffset===0?'היום':formatDate(viewOffset);
  if(confirm(`לאפס את כל הרישום של ${label}?`)){DB[k]=[];save();updTodayBar();renderDayLog();buildWeekStrip();showToast('🔄 יום אופס');}
}

// Today's budget bar (always shows today)
function updTodayBar(){
  const items=DB[todayKey()]||[];
  const used=items.reduce((s,i)=>s+i.pts,0),rem=bud-used,pct=Math.min((used/bud)*100,100);
  const uE=document.getElementById('uv'),rE=document.getElementById('rv');
  uE.textContent=fp(used);uE.className='bv'+(used>bud?' r':used>=bud*.8?' w':'');
  rE.textContent=fp(rem);rE.className='bv'+(rem<0?' r':rem<bud*.2?' w':'');
  const f=document.getElementById('pf');f.style.width=pct+'%';f.className='pgf'+(pct>=100?' r':pct>=80?' w':'');
}

// Current viewed day bar
function updateDayView(){updateDayNav();renderDayLog();}

function updateDayNav(){
  const d=dateByOffset(viewOffset);
  const isToday=viewOffset===0;
  const dn=document.getElementById('dnDate');
  dn.textContent=`יום ${'ראשון שני שלישי רביעי חמישי שישי שבת'.split(' ')[d.getDay()]}, ${formatDate(viewOffset)}`;
  dn.className='dn-date'+(isToday?' today':'');
  document.getElementById('dnSub').textContent=isToday?'לחצי לחזור להיום':'לחצי לחזור להיום';
  document.getElementById('dnTodayBtn').disabled=isToday;

  // Day budget bar for current view
  const k=keyByOffset(viewOffset);
  const items=DB[k]||[];
  const used=items.reduce((s,i)=>s+i.pts,0),rem=bud-used,pct=Math.min((used/bud)*100,100);
  const duE=document.getElementById('dUsed'),drE=document.getElementById('dRem');
  duE.textContent=fp(used);duE.className='dbb-v'+(used>bud?' r':used>=bud*.8?' w':'');
  drE.textContent=fp(rem);drE.className='dbb-v'+(rem<0?' r':rem<bud*.2?' w':'');
  const dpf=document.getElementById('dpf');dpf.style.width=pct+'%';dpf.className='pgf'+(pct>=100?' r':pct>=80?' w':'');
}

function moveDay(dir){viewOffset+=dir;updateDayView();buildWeekStrip();}
function goToday(){if(viewOffset!==0){viewOffset=0;updateDayView();buildWeekStrip();}}

// WEEK STRIP — 14 days: 7 past + today + 6 future
function buildWeekStrip(){
  const c=document.getElementById('weekStrip');c.innerHTML='';
  const DAY_SHORT=['א','ב','ג','ד','ה','ו','ש'];
  // Show 7 days before viewOffset and 7 after — always centered on current view
  for(let off=viewOffset-7;off<=viewOffset+7;off++){
    const d=dateByOffset(off);
    const k=keyByOffset(off);
    const items=DB[k]||[];
    const tot=items.reduce((s,i)=>s+i.pts,0);
    const isToday=off===0;
    const isActive=off===viewOffset;
    const el=document.createElement('div');
    el.className='wday'+(isActive?' active':'')+(isToday&&!isActive?' today-marker':'');
    const ptsColor=tot>0?(tot>bud?'r':tot>=bud*.8?'w':'has'):'';
    el.innerHTML=`<div class="wday-name">${DAY_SHORT[d.getDay()]}</div><div class="wday-num">${d.getDate()}</div><div class="wday-pts ${ptsColor}">${tot>0?fp(tot):'—'}</div><div class="wday-dot ${tot>0?'show':''}"></div>`;
    el.onclick=(()=>{const o=off;return()=>{viewOffset=o;updateDayView();buildWeekStrip();}})();
    c.appendChild(el);
  }
  // Scroll active into view
  setTimeout(()=>{const active=c.querySelector('.wday.active');if(active)active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});},50);
}

function renderDayLog(){
  const k=keyByOffset(viewOffset);
  const items=DB[k]||[];
  const total=items.reduce((s,i)=>s+i.pts,0);
  const oc=total>bud?'r':total>=bud*.8?'w':'';
  const c=document.getElementById('lc');c.innerHTML='';
  const isToday=viewOffset===0;
  const label=isToday?'🗓 היום':`📅 ${dayName(viewOffset)}`;
  const tt=document.createElement('div');tt.className='ltt';
  tt.innerHTML=`<span>${label}</span><span class="dbg ${oc}">${fp(total)} / ${bud} נקודות</span>`;
  c.appendChild(tt);
  if(!items.length){
    const e=document.createElement('div');e.className='el';
    const msg=isToday?'עברי לחיפוש והוסיפי מזון.':'אין רישומים ליום זה.';
    e.innerHTML=`<span class="em">🥗</span>עדיין לא הוספת מזון.<br>${msg}`;
    c.appendChild(e);
  } else {
    [...items].reverse().forEach(item=>{
      const el=document.createElement('div');el.className='li';
      el.innerHTML=`<div class="lt">${ft(item.time)}</div><div class="ln">${item.name}</div><div class="lpts">${fp(item.pts)}</div><button class="rm" onclick="removeItem('${k}',${item.id})">🗑</button>`;
      c.appendChild(el);
    });
  }
}

// ── SEARCH ──
const CATS_DISPLAY=["א","ב","ג","ד","ה","ו","ז","ח","ט","י","כ","ל","מ","נ","ס","ע","פ","צ","ק","ר","ש","ת","x"];
function buildChips(){const c=document.getElementById('cc');CATS_DISPLAY.forEach(cat=>{const ch=document.createElement('button');ch.className='chip';ch.textContent=CLABELS[cat]||cat;ch.onclick=()=>toggleCat(cat,ch);c.appendChild(ch);});}
function toggleCat(cat,chip){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));if(acCat===cat){acCat=null;document.getElementById('cr').innerHTML='';return;}acCat=cat;chip.classList.add('active');const foods=F.filter(f=>f.c===cat);const c=document.getElementById('cr');c.innerHTML='';const t=document.createElement('div');t.className='rtit';t.textContent=(CLABELS[cat]||cat)+` — ${foods.length} פריטים`;c.appendChild(t);foods.forEach(f=>c.appendChild(mkFC(f)));}

const FJ=JSON.stringify(F.map(f=>({n:f.n,p:f.p,s:f.s||0})));
async function doSearch(){
  const q=document.getElementById('si').value.trim();if(!q)return;
  document.getElementById('ar').innerHTML='';document.getElementById('ld').style.display='block';document.getElementById('sb').disabled=true;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`אתה עוזר חיפוש מזון לתוכנית שומרי משקל. ענה תמיד ב-JSON בלבד ללא שום טקסט נוסף.
מבנה: {"results":[{"n":"שם מזון","p":נקודות,"s":0_או_1}],"msg":"הודעה קצרה בעברית"}
חפש את המזון המבוקש ברשימה. החזר עד 8 תוצאות ממוינות לפי רלוונטיות. אם לא נמצא בדיוק, החזר מזונות דומים.
רשימת המזונות: ${FJ}`,messages:[{role:"user",content:`חפש: "${q}"`}]})});
    const data=await resp.json();const text=data.content?.[0]?.text||'{}';let parsed;
    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){parsed={results:localS(q),msg:`תוצאות עבור "${q}"`};}
    renderRes(parsed);
  }catch(e){renderRes({results:localS(q),msg:`נמצאו ${localS(q).length} תוצאות`});}
  document.getElementById('ld').style.display='none';document.getElementById('sb').disabled=false;
}
function localS(q){const terms=q.toLowerCase().split(' ').filter(t=>t.length>1);return F.filter(f=>terms.every(t=>f.n.toLowerCase().includes(t))).slice(0,8).map(f=>({n:f.n,p:f.p,s:f.s||0}));}
function renderRes(data){
  const c=document.getElementById('ar');c.innerHTML='';
  if(data.msg){const m=document.createElement('div');m.style.cssText='font-size:11px;color:var(--mut);padding:4px 2px 8px;';m.textContent='🤖 '+data.msg;c.appendChild(m);}
  const res=data.results||[];
  if(!res.length){c.innerHTML+='<div class="nores">🔍 לא נמצאו תוצאות. נסי מילים אחרות.</div>';return;}
  const t=document.createElement('div');t.className='rtit';t.textContent='תוצאות חיפוש';c.appendChild(t);
  res.forEach(item=>c.appendChild(mkFC(item)));
}
function mkFC(food){const el=document.createElement('div');el.className='fc';const safe=food.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");el.innerHTML=`<div class="fn">${food.s?'<span class="sb">★ על</span>':''}${food.n}</div><div class="fp">${fp(food.p)}</div><button class="ab" onclick="addToLog('${safe}',${food.p})">+</button>`;return el;}

// ── PAGE NAV ──
function showPg(p){
  ['S','L'].forEach(x=>{
    document.getElementById('pg'+x).classList.toggle('active',p===x.toLowerCase());
    document.getElementById('t'+x).classList.toggle('active',p===x.toLowerCase());
    document.getElementById('n'+x).classList.toggle('active',p===x.toLowerCase());
  });
  if(p==='l'){updateDayView();buildWeekStrip();}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);}

// ── INIT ──
load();updTodayBar();buildChips();
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
